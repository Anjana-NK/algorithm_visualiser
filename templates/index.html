<!DOCTYPE html>
<html>
<head>
    <title>Algorithm Visualizer</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<h1>Algorithm Visualizer </h1>
<p class="info">See how algorithms work step-by-step.</p>
<div class="complexity">
Bubble Sort → Time: O(n²)<br>
Binary Search → Time: O(log n),<br>
</div>

<div class="controls">

<input type="text" id="arrayInput" placeholder="Enter numbers (comma separated)">
<input type="number" id="searchInput" placeholder="Number to search">

<button onclick="startBinarySearch()">Binary Search</button>
<button onclick="startBubbleSort()">Bubble Sort</button>

</div>

<div id="explanation"></div>

<div id="arrayContainer"></div>

<div id="result"></div>

<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
